<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Data analytics live dashboard animation</title>
  <desc>Animated live dashboard showing streaming data, bar charts forming, KPI cards updating, and trend lines drawing in real time</desc>

  <defs>
    <radialGradient id="barGlow1" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#e040fb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e040fb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="barGlow2" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#c2185b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c2185b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes bar1up  { 0%,100%{transform:scaleY(0.55)} 25%{transform:scaleY(0.74)} 50%{transform:scaleY(0.92)} 75%{transform:scaleY(0.73)} }
    @keyframes bar2up  { 0%,100%{transform:scaleY(0.60)} 25%{transform:scaleY(0.72)} 50%{transform:scaleY(0.85)} 75%{transform:scaleY(0.71)} }
    @keyframes bar3up  { 0%,100%{transform:scaleY(0.65)} 25%{transform:scaleY(0.82)} 50%{transform:scaleY(0.97)} 75%{transform:scaleY(0.80)} }
    @keyframes bar4up  { 0%,100%{transform:scaleY(0.50)} 25%{transform:scaleY(0.62)} 50%{transform:scaleY(0.78)} 75%{transform:scaleY(0.61)} }
    @keyframes bar5up  { 0%,100%{transform:scaleY(0.58)} 25%{transform:scaleY(0.73)} 50%{transform:scaleY(0.88)} 75%{transform:scaleY(0.72)} }
    @keyframes bar6up  { 0%,100%{transform:scaleY(0.62)} 25%{transform:scaleY(0.78)} 50%{transform:scaleY(0.93)} 75%{transform:scaleY(0.77)} }
    @keyframes bar7up  { 0%,100%{transform:scaleY(0.54)} 25%{transform:scaleY(0.68)} 50%{transform:scaleY(0.82)} 75%{transform:scaleY(0.67)} }

    @keyframes kpi-count { 0%,100%{opacity:0.5} 50%{opacity:1} }

    @keyframes trend-draw {
      0%   { stroke-dashoffset: 300; opacity:0; }
      15%  { opacity:1; }
      85%  { opacity:1; }
      100% { stroke-dashoffset: 0; opacity:0; }
    }

    @keyframes dot-ping {
      0%   { r:2; opacity:1; }
      100% { r:10; opacity:0; }
    }

    @keyframes scan-h {
      0%   { transform: translateY(0); opacity:0.07; }
      100% { transform: translateY(360px); opacity:0.07; }
    }

    @keyframes flow-in {
      0%   { stroke-dashoffset: 120; opacity:0; }
      20%  { opacity:0.6; }
      80%  { opacity:0.6; }
      100% { stroke-dashoffset: 0; opacity:0; }
    }

    @keyframes row-hi { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* Each bar anchors to the BOTTOM CENTER of its own fill-box so
       scaleY grows the rect upward from the chart baseline cleanly.
       (Using absolute pixel transform-origin values made them jump.) */
    .bar {
      transform-box: fill-box;
      transform-origin: center bottom;
      will-change: transform;
    }
    .b1 { animation: bar1up 9s cubic-bezier(0.37, 0, 0.63, 1) infinite; }
    .b2 { animation: bar2up 9s cubic-bezier(0.37, 0, 0.63, 1) infinite -1.1s; }
    .b3 { animation: bar3up 9s cubic-bezier(0.37, 0, 0.63, 1) infinite -2.2s; }
    .b4 { animation: bar4up 9s cubic-bezier(0.37, 0, 0.63, 1) infinite -3.3s; }
    .b5 { animation: bar5up 9s cubic-bezier(0.37, 0, 0.63, 1) infinite -4.4s; }
    .b6 { animation: bar6up 9s cubic-bezier(0.37, 0, 0.63, 1) infinite -5.5s; }
    .b7 { animation: bar7up 9s cubic-bezier(0.37, 0, 0.63, 1) infinite -6.6s; }

    .kpi-num { animation: kpi-count 3s ease-in-out infinite; }

    .trend-line {
      stroke-dasharray: 300;
      animation: trend-draw 3s ease-in-out infinite;
      fill: none;
    }

    .ping { animation: dot-ping 1.5s ease-out infinite; fill: none; }
    .scan { animation: scan-h 5s linear infinite; }
    .flow { stroke-dasharray: 8 6; animation: flow-in 2s ease-in-out infinite; fill:none; }
    .row  { animation: row-hi 3s ease-in-out infinite; }
  </style>

  <rect width="680" height="420" fill="#000000" rx="12"/>

  <rect class="scan" x="0" y="-80" width="680" height="60" fill="#e040fb" opacity="0.05"/>

  <text x="42" y="46" font-family="monospace" font-size="9" fill="#c2185b" letter-spacing="2">DATA ANALYTICS</text>
  <text x="42" y="62" font-family="monospace" font-size="8" fill="#2e2e42" letter-spacing="1">LIVE · OPERATIONAL INTELLIGENCE PLATFORM</text>

  <text x="42" y="90" font-family="monospace" font-size="7" fill="#2e2e42" letter-spacing="1">TREND · 30D</text>

  <polyline points="42,175 80,160 118,168 156,140 194,148 232,122 270,130 308,108 322,115" stroke="#e040fb" stroke-width="1.5" fill="none" opacity="0.25"/>
  <polyline points="42,182 80,178 118,172 156,168 194,155 232,150 270,142 308,128 322,120" stroke="#e040fb" stroke-width="1" fill="none" opacity="0.12" stroke-dasharray="3 3"/>

  <path d="M 42,175 80,160 118,168 156,140 194,148 232,122 270,130 308,108 322,115" stroke="#e040fb" stroke-width="2" fill="none" class="trend-line" opacity="0.9"/>
  <path d="M 42,182 80,170 118,165 156,155 194,148 232,138 270,128 308,118 322,112" stroke="#c2185b" stroke-width="1.5" fill="none" class="trend-line" style="animation-delay:1s" opacity="0.7"/>

  <circle cx="322" cy="115" r="3" fill="#e040fb">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="322" cy="115" r="2" fill="none" stroke="#e040fb" stroke-width="1" class="ping"/>
  <circle cx="322" cy="115" r="2" fill="none" stroke="#e040fb" stroke-width="0.5" class="ping" style="animation-delay:0.5s"/>

  <g font-family="monospace" font-size="7" fill="#2e2e42">
    <text x="42"  y="192">Jan</text>
    <text x="115" y="192">Mar</text>
    <text x="190" y="192">Jun</text>
    <text x="265" y="192">Sep</text>
    <text x="310" y="192">Now</text>
  </g>

  <text x="42"  y="215" font-family="monospace" font-size="7" fill="#2e2e42" letter-spacing="1">VOLUME · WEEKLY</text>

  <g>
    <g class="bar b1">
      <rect x="55" y="260" width="22" height="90" rx="2" fill="#e040fb" opacity="0.8"/>
      <rect x="55" y="260" width="22" height="90" rx="2" fill="url(#barGlow1)"/>
    </g>
    <g class="bar b2">
      <rect x="95"  y="280" width="22" height="70" rx="2" fill="#e040fb" opacity="0.6"/>
    </g>
    <g class="bar b3">
      <rect x="135" y="270" width="22" height="80" rx="2" fill="#e040fb" opacity="0.8"/>
    </g>
    <g class="bar b4">
      <rect x="175" y="295" width="22" height="55" rx="2" fill="#c2185b" opacity="0.7"/>
    </g>
    <g class="bar b5">
      <rect x="215" y="265" width="22" height="85" rx="2" fill="#c2185b" opacity="0.5"/>
    </g>
    <g class="bar b6">
      <rect x="255" y="275" width="22" height="75" rx="2" fill="#e040fb" opacity="0.85"/>
      <rect x="255" y="275" width="22" height="75" rx="2" fill="url(#barGlow1)"/>
    </g>
    <g class="bar b7">
      <rect x="295" y="285" width="22" height="65" rx="2" fill="#c2185b" opacity="0.6"/>
    </g>
  </g>

  <g font-family="monospace" font-size="7" fill="#2e2e42">
    <text x="60"  y="362">W1</text>
    <text x="100" y="362">W2</text>
    <text x="140" y="362">W3</text>
    <text x="180" y="362">W4</text>
    <text x="220" y="362">W5</text>
    <text x="260" y="362">W6</text>
    <text x="300" y="362">W7</text>
  </g>

  <g font-family="monospace" font-size="7" fill="#2e2e42" opacity="0.5">
    <text x="42" y="258">100k</text>
    <text x="42" y="295">50k</text>
    <text x="42" y="351">0</text>
  </g>

  <g font-family="monospace" font-size="7" fill="#2e2e42" letter-spacing="1">
    <text x="42" y="395">SOURCE postgres · bigquery · mixpanel</text>
    <text x="42" y="408" fill="#555566">└ last sync 0s ago</text>
  </g>

  <text x="380" y="90" font-family="monospace" font-size="7" fill="#2e2e42" letter-spacing="1">KPI CARDS · LIVE</text>

  <g>
    <rect x="380" y="98" width="130" height="64" rx="6" fill="#000000" stroke="#2e2e42" stroke-width="0.6"/>
    <text x="392" y="115" font-family="monospace" font-size="7" fill="#555566" letter-spacing="1">REVENUE</text>
    <text x="392" y="138" font-family="monospace" font-size="18" fill="#e040fb" font-weight="500" class="kpi-num">$2.4M</text>
    <text x="392" y="153" font-family="monospace" font-size="7" fill="#e040fb" opacity="0.6">↑ 18.3% vs last mo</text>
  </g>

  <g>
    <rect x="522" y="98" width="136" height="64" rx="6" fill="#000000" stroke="#2e2e42" stroke-width="0.6"/>
    <text x="534" y="115" font-family="monospace" font-size="7" fill="#555566" letter-spacing="1">ACTIVE USERS</text>
    <text x="534" y="138" font-family="monospace" font-size="18" fill="#c2185b" font-weight="500" class="kpi-num" style="animation-delay:0.5s">84.2k</text>
    <text x="534" y="153" font-family="monospace" font-size="7" fill="#c2185b" opacity="0.6">↑ 6.1% vs last mo</text>
  </g>

  <g>
    <rect x="380" y="174" width="130" height="64" rx="6" fill="#000000" stroke="#2e2e42" stroke-width="0.6"/>
    <text x="392" y="191" font-family="monospace" font-size="7" fill="#555566" letter-spacing="1">CHURN RATE</text>
    <text x="392" y="214" font-family="monospace" font-size="18" fill="#e040fb" font-weight="500" class="kpi-num" style="animation-delay:1s">1.8%</text>
    <text x="392" y="229" font-family="monospace" font-size="7" fill="#e040fb" opacity="0.6">↓ 0.4pp improved</text>
  </g>

  <g>
    <rect x="522" y="174" width="136" height="64" rx="6" fill="#000000" stroke="#2e2e42" stroke-width="0.6"/>
    <text x="534" y="191" font-family="monospace" font-size="7" fill="#555566" letter-spacing="1">CONV RATE</text>
    <text x="534" y="214" font-family="monospace" font-size="18" fill="#c2185b" font-weight="500" class="kpi-num" style="animation-delay:1.5s">3.7%</text>
    <text x="534" y="229" font-family="monospace" font-size="7" fill="#c2185b" opacity="0.6">↑ 0.9pp this week</text>
  </g>

  <path d="M 380 250 Q 430 240 480 255 Q 530 265 580 248 Q 615 238 658 242" stroke="#e040fb" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M 380 250 Q 430 240 480 255 Q 530 265 580 248 Q 615 238 658 242" stroke="#e040fb" stroke-width="2" fill="none" class="trend-line" style="animation-delay:0.5s"/>
  <path d="M 380 262 Q 430 270 480 258 Q 530 245 580 260 Q 615 268 658 255" stroke="#c2185b" stroke-width="1.5" fill="none" class="trend-line" style="animation-delay:1.5s" opacity="0.7"/>

  <text x="380" y="244" font-family="monospace" font-size="7" fill="#2e2e42" letter-spacing="1">DEMAND FORECAST</text>

  <g font-family="monospace" font-size="7" fill="#2e2e42">
    <text x="380" y="292">Oct</text>
    <text x="454" y="292">Nov</text>
    <text x="530" y="292">Dec</text>
    <text x="620" y="292">Jan</text>
  </g>

  <circle cx="658" cy="242" r="2.5" fill="#e040fb">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="658" cy="242" r="2" fill="none" stroke="#e040fb" stroke-width="1" class="ping" style="animation-delay:0.3s"/>

  <text x="380" y="316" font-family="monospace" font-size="7" fill="#2e2e42" letter-spacing="1">LIVE EVENT STREAM</text>

  <g font-family="monospace" font-size="7">
    <g class="row" style="animation-delay:0s">
      <text x="380" y="330" fill="#555566">12:04:01</text>
      <text x="440" y="330" fill="#e040fb">purchase</text>
      <text x="500" y="330" fill="#2e2e42">user_8821</text>
      <text x="570" y="330" fill="#e040fb">$129</text>
    </g>
    <g class="row" style="animation-delay:0.8s">
      <text x="380" y="344" fill="#555566">12:04:03</text>
      <text x="440" y="344" fill="#c2185b">churn</text>
      <text x="500" y="344" fill="#2e2e42">user_3310</text>
      <text x="570" y="344" fill="#c2185b">—</text>
    </g>
    <g class="row" style="animation-delay:1.6s">
      <text x="380" y="358" fill="#555566">12:04:05</text>
      <text x="440" y="358" fill="#e040fb">signup</text>
      <text x="500" y="358" fill="#2e2e42">user_9204</text>
      <text x="570" y="358" fill="#e040fb">free</text>
    </g>
    <g class="row" style="animation-delay:2.4s">
      <text x="380" y="372" fill="#555566">12:04:07</text>
      <text x="440" y="372" fill="#e040fb">upgrade</text>
      <text x="500" y="372" fill="#2e2e42">user_1142</text>
      <text x="570" y="372" fill="#e040fb">$299</text>
    </g>
  </g>

  <circle cx="390" cy="395" r="3" fill="#e040fb">
    <animate attributeName="opacity" values="1;0.1;1" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <text x="400" y="399" font-family="monospace" font-size="7" fill="#555566" letter-spacing="1">STREAMING · 4 events/sec</text>

  <text x="638" y="408" text-anchor="end" font-family="monospace" font-size="7" fill="#2e2e42" letter-spacing="1">DEVBROZ ANALYTICS v1</text>

  <path d="M 340 96  C 340 86  380 82 380 98"  stroke="#e040fb" stroke-width="0.8" fill="none" class="flow" opacity="0.5"/>
  <path d="M 340 195 C 340 185 380 180 380 174" stroke="#e040fb" stroke-width="0.8" fill="none" class="flow" opacity="0.4" style="animation-delay:0.4s"/>
</svg>

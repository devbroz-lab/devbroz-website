<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Data flow animation</title>
  <desc>Animated diagram showing data streams from five sources converging into a central processing hub and flowing to outputs</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <path id="p1" d="M 108 90 C 170 90 210 180 278 218"/>
    <path id="p2" d="M 108 180 C 175 180 225 205 278 225"/>
    <path id="p3" d="M 108 270 C 175 270 225 250 278 238"/>
    <path id="p4" d="M 108 355 C 175 355 230 295 278 252"/>
    <path id="p5" d="M 108 430 C 175 430 235 320 278 262"/>
    <path id="op1" d="M 376 215 C 450 200 510 150 572 120"/>
    <path id="op2" d="M 376 245 C 470 245 520 290 572 320"/>
    <path id="op3" d="M 376 262 C 450 295 510 360 572 390"/>
  </defs>

  <style>
    @keyframes flow-dash { to { stroke-dashoffset: -30; } }
    @keyframes pulse-ring { 0% { opacity: 0.55; r: 36; } 100% { opacity: 0; r: 72; } }
    @keyframes hub-pulse { 0%,100%{opacity:0.08} 50%{opacity:0.18} }
    @keyframes node-breathe { 0%,100%{opacity:1} 50%{opacity:0.7} }

    .pipe { stroke-dasharray: 6 5; animation: flow-dash 1.3s linear infinite; fill: none; }
    .pipe-slow { stroke-dasharray: 6 5; animation: flow-dash 2.1s linear infinite; fill: none; }
    .pipe-out { stroke-dasharray: 5 6; animation: flow-dash 0.95s linear infinite; fill: none; }
    .ring1 { animation: pulse-ring 2.2s ease-out infinite; fill:none; stroke:#e040fb; stroke-width:0.8; }
    .ring2 { animation: pulse-ring 2.2s ease-out infinite 1.1s; fill:none; stroke:#e040fb; stroke-width:0.8; }
    .hub-glow { animation: hub-pulse 2.8s ease-in-out infinite; }
    .nb { animation: node-breathe 3s ease-in-out infinite; }
    .nb2 { animation: node-breathe 3s ease-in-out infinite 0.4s; }
    .nb3 { animation: node-breathe 3s ease-in-out infinite 0.8s; }
    .nb4 { animation: node-breathe 3s ease-in-out infinite 1.2s; }
    .nb5 { animation: node-breathe 3s ease-in-out infinite 1.6s; }
  </style>

  <!-- Background -->
  <rect width="680" height="480" fill="#000000"/>

  <!-- Subtle grid -->
  <g stroke="#000000" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="120" x2="680" y2="120"/>
    <line x1="0" y1="240" x2="680" y2="240"/>
    <line x1="0" y1="360" x2="680" y2="360"/>
    <line x1="170" y1="0" x2="170" y2="480"/>
    <line x1="340" y1="0" x2="340" y2="480"/>
    <line x1="510" y1="0" x2="510" y2="480"/>
  </g>

  <!-- INPUT PIPES -->
  <path d="M 108 90 C 170 90 210 180 278 218" stroke="#e040fb" stroke-width="1.5" class="pipe" opacity="0.65"/>
  <path d="M 108 180 C 175 180 225 205 278 225" stroke="#e040fb" stroke-width="1.5" class="pipe" opacity="0.65" style="animation-delay:-0.5s"/>
  <path d="M 108 270 C 175 270 225 250 278 238" stroke="#c2185b" stroke-width="1.5" class="pipe" opacity="0.65" style="animation-delay:-1.1s"/>
  <path d="M 108 355 C 175 355 230 295 278 252" stroke="#c2185b" stroke-width="1.5" class="pipe-slow" opacity="0.6" style="animation-delay:-0.3s"/>
  <path d="M 108 430 C 175 430 235 320 278 262" stroke="#40c4fb" stroke-width="1.5" class="pipe-slow" opacity="0.6" style="animation-delay:-1.7s"/>

  <!-- SOURCE NODES -->
  <g class="nb">
    <rect x="12" y="66" width="92" height="48" rx="8" fill="#000000" stroke="#e040fb" stroke-width="1"/>
    <text x="58" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#e040fb" letter-spacing="1">API</text>
    <text x="58" y="101" text-anchor="middle" font-family="monospace" font-size="8" fill="#555566">REST · GraphQL</text>
    <circle cx="104" cy="90" r="3" fill="#e040fb"/>
  </g>
  <g class="nb2">
    <rect x="12" y="156" width="92" height="48" rx="8" fill="#000000" stroke="#e040fb" stroke-width="1"/>
    <text x="58" y="175" text-anchor="middle" font-family="monospace" font-size="9" fill="#e040fb" letter-spacing="1">DATABASE</text>
    <text x="58" y="191" text-anchor="middle" font-family="monospace" font-size="8" fill="#555566">SQL · NoSQL</text>
    <circle cx="104" cy="180" r="3" fill="#e040fb"/>
  </g>
  <g class="nb3">
    <rect x="12" y="246" width="92" height="48" rx="8" fill="#000000" stroke="#c2185b" stroke-width="1"/>
    <text x="58" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#c2185b" letter-spacing="1">EVENTS</text>
    <text x="58" y="281" text-anchor="middle" font-family="monospace" font-size="8" fill="#555566">Kafka · Queue</text>
    <circle cx="104" cy="270" r="3" fill="#c2185b"/>
  </g>
  <g class="nb4">
    <rect x="12" y="330" width="92" height="48" rx="8" fill="#000000" stroke="#c2185b" stroke-width="1"/>
    <text x="58" y="349" text-anchor="middle" font-family="monospace" font-size="9" fill="#c2185b" letter-spacing="1">FILES</text>
    <text x="58" y="365" text-anchor="middle" font-family="monospace" font-size="8" fill="#555566">S3 · SFTP</text>
    <circle cx="104" cy="355" r="3" fill="#c2185b"/>
  </g>
  <g class="nb5">
    <rect x="12" y="405" width="92" height="48" rx="8" fill="#000000" stroke="#40c4fb" stroke-width="1"/>
    <text x="58" y="424" text-anchor="middle" font-family="monospace" font-size="9" fill="#40c4fb" letter-spacing="1">SENSORS</text>
    <text x="58" y="440" text-anchor="middle" font-family="monospace" font-size="8" fill="#555566">IoT · Streams</text>
    <circle cx="104" cy="430" r="3" fill="#40c4fb"/>
  </g>

  <!-- HUB PULSE RINGS -->
  <circle cx="340" cy="240" class="ring1"/>
  <circle cx="340" cy="240" class="ring2"/>
  <!-- Hub glow -->
  <circle cx="340" cy="240" r="44" fill="#e040fb" class="hub-glow"/>
  <!-- Hub body -->
  <circle cx="340" cy="240" r="36" fill="#000000" stroke="#e040fb" stroke-width="1.5"/>
  <circle cx="340" cy="240" r="26" fill="#000000" stroke="#e040fb" stroke-width="0.5" opacity="0.5"/>
  <!-- Hub label -->
  <text x="340" y="234" text-anchor="middle" font-family="monospace" font-size="8" fill="#e040fb" letter-spacing="2">PROCESS</text>
  <text x="340" y="248" text-anchor="middle" font-family="monospace" font-size="7" fill="#555566" letter-spacing="1">ENGINE</text>
  <!-- Rotating dots on hub ring -->
  <g transform="translate(340,240)">
    <animateTransform attributeName="transform" type="rotate" additive="sum" from="0 0 0" to="360 0 0" dur="10s" repeatCount="indefinite"/>
    <circle cx="0" cy="-28" r="2.5" fill="#e040fb" opacity="0.9"/>
    <circle cx="28" cy="0" r="2.5" fill="#c2185b" opacity="0.9"/>
    <circle cx="0" cy="28" r="2.5" fill="#e040fb" opacity="0.9"/>
    <circle cx="-28" cy="0" r="2.5" fill="#c2185b" opacity="0.9"/>
  </g>

  <!-- OUTPUT PIPES -->
  <path d="M 376 215 C 450 200 510 150 572 120" stroke="#e040fb" stroke-width="1.5" class="pipe-out" opacity="0.75"/>
  <path d="M 376 245 C 470 245 520 290 572 320" stroke="#c2185b" stroke-width="1.5" class="pipe-out" opacity="0.75" style="animation-delay:-0.5s"/>
  <path d="M 376 262 C 450 295 510 360 572 390" stroke="#40c4fb" stroke-width="1.5" class="pipe-out" opacity="0.7" style="animation-delay:-1s"/>

  <!-- OUTPUT NODES -->
  <g>
    <rect x="576" y="96" width="92" height="48" rx="8" fill="#000000" stroke="#e040fb" stroke-width="1"/>
    <circle cx="576" cy="120" r="3" fill="#e040fb"/>
    <text x="622" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#e040fb" letter-spacing="1">ANALYTICS</text>
    <text x="622" y="131" text-anchor="middle" font-family="monospace" font-size="8" fill="#555566">Dashboards</text>
  </g>
  <g>
    <rect x="576" y="296" width="92" height="48" rx="8" fill="#000000" stroke="#c2185b" stroke-width="1"/>
    <circle cx="576" cy="320" r="3" fill="#c2185b"/>
    <text x="622" y="315" text-anchor="middle" font-family="monospace" font-size="9" fill="#c2185b" letter-spacing="1">STORAGE</text>
    <text x="622" y="331" text-anchor="middle" font-family="monospace" font-size="8" fill="#555566">Data lake</text>
  </g>
  <g>
    <rect x="576" y="365" width="92" height="48" rx="8" fill="#000000" stroke="#40c4fb" stroke-width="1"/>
    <circle cx="576" cy="390" r="3" fill="#40c4fb"/>
    <text x="622" y="384" text-anchor="middle" font-family="monospace" font-size="9" fill="#40c4fb" letter-spacing="1">ALERTS</text>
    <text x="622" y="400" text-anchor="middle" font-family="monospace" font-size="8" fill="#555566">Webhooks</text>
  </g>

  <!-- PARTICLES — Input streams -->
  <circle r="3.5" fill="#e040fb">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="0s"><mpath href="#p1"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="3.5" fill="#e040fb">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="0.9s"><mpath href="#p1"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.2s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  <circle r="3.5" fill="#e040fb">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.3s"><mpath href="#p2"/></animateMotion>
    <animate attributeName="opacity" values="0;0.85;0.85;0" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle r="3.5" fill="#e040fb">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1.3s"><mpath href="#p2"/></animateMotion>
    <animate attributeName="opacity" values="0;0.85;0.85;0" dur="2s" repeatCount="indefinite" begin="1.3s"/>
  </circle>
  <circle r="3.5" fill="#c2185b">
    <animateMotion dur="1.9s" repeatCount="indefinite" begin="0.5s"><mpath href="#p3"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="1.9s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle r="3.5" fill="#c2185b">
    <animateMotion dur="1.9s" repeatCount="indefinite" begin="1.45s"><mpath href="#p3"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="1.9s" repeatCount="indefinite" begin="1.45s"/>
  </circle>
  <circle r="3" fill="#c2185b">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0.4s"><mpath href="#p4"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.6s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle r="3" fill="#c2185b">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="1.7s"><mpath href="#p4"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.6s" repeatCount="indefinite" begin="1.7s"/>
  </circle>
  <circle r="3" fill="#40c4fb">
    <animateMotion dur="2.9s" repeatCount="indefinite" begin="0.8s"><mpath href="#p5"/></animateMotion>
    <animate attributeName="opacity" values="0;0.85;0.85;0" dur="2.9s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle r="3" fill="#40c4fb">
    <animateMotion dur="2.9s" repeatCount="indefinite" begin="2.3s"><mpath href="#p5"/></animateMotion>
    <animate attributeName="opacity" values="0;0.85;0.85;0" dur="2.9s" repeatCount="indefinite" begin="2.3s"/>
  </circle>

  <!-- PARTICLES — Output streams -->
  <circle r="3.5" fill="#e040fb">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0s"><mpath href="#op1"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="3.5" fill="#e040fb">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.75s"><mpath href="#op1"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
  </circle>
  <circle r="3.5" fill="#c2185b">
    <animateMotion dur="1.7s" repeatCount="indefinite" begin="0.2s"><mpath href="#op2"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.7s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle r="3.5" fill="#c2185b">
    <animateMotion dur="1.7s" repeatCount="indefinite" begin="1.05s"><mpath href="#op2"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.7s" repeatCount="indefinite" begin="1.05s"/>
  </circle>
  <circle r="3" fill="#40c4fb">
    <animateMotion dur="1.9s" repeatCount="indefinite" begin="0.5s"><mpath href="#op3"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="1.9s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle r="3" fill="#40c4fb">
    <animateMotion dur="1.9s" repeatCount="indefinite" begin="1.45s"><mpath href="#op3"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="1.9s" repeatCount="indefinite" begin="1.45s"/>
  </circle>

  <!-- Section labels -->
  <text x="58" y="36" text-anchor="middle" font-family="monospace" font-size="8" fill="#2e2e42" letter-spacing="2">SOURCES</text>
  <text x="340" y="36" text-anchor="middle" font-family="monospace" font-size="8" fill="#2e2e42" letter-spacing="2">PIPELINE</text>
  <text x="622" y="80" text-anchor="middle" font-family="monospace" font-size="8" fill="#2e2e42" letter-spacing="2">OUTPUTS</text>
</svg>
